# ============================================================
#  Grupo 3 — Portal de consulta + puerta de enlace
#  php-portal (PHP 8.3, solo lectura) · nginx (gateway + file server)
#  PHP lee PostgreSQL (logs) y consulta a Node por API. Nginx es la única entrada.
# ============================================================

networks:
  qd_net:
    driver: bridge

services:

  # ── PHP 8.3 — Portal de lectura (read-only) + reportes ─────
  #  Sin login. Lista vigentes (via Node), descarga via Nginx,
  #  y usa PostgreSQL solo para logs de acceso y reportes.
  php-portal:
    build:
      context: ./php-portal
      dockerfile: Dockerfile
    container_name: qd_php
    restart: unless-stopped
    # Sin puerto publicado: acceso por Nginx en /portal/.
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      NODE_URL: http://node-search:3000
      NODE_API_KEY: ${NODE_API_KEY}
      PORTAL_EMPRESA_ID: ${PORTAL_EMPRESA_ID:-2}
    networks:
      - qd_net
    depends_on:
      postgres:
        condition: service_healthy
      node-search:
        condition: service_started

  # ── Nginx — Gateway + File server de los documentos ────────
  #  Única entrada (/, /portal, /search, /files). Sirve ./storage en /files/.
  nginx:
    image: nginx:1.27-alpine
    container_name: qd_nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # GATEWAY: única entrada (/, /portal, /search, /files)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./storage:/srv/files:ro
    networks:
      - qd_net
    depends_on:
      - web
      - php-portal
      - node-search
